<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griya Jaten Indah - Kost Manager</title>
<meta name="theme-color" content="#173F27">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --dark:#173F27; --dark2:#0F2E1A; --mid:#2F5C3C;
  --gold:#B9902E; --gold-light:#D9B968; --chip:#F0E9D2;
  --bg:#F6F8F2; --border:#E4E2D8; --ink:#173F27;
  --text:#374151; --muted:#6B7280; --muted2:#9A988F;
  --good-bg:#EAF3DE; --good-fg:#27500A;
  --bad-bg:#FCEBEB; --bad-fg:#791F1F;
  --accent-bg:#FAEEDA; --accent-fg:#633806;
}
*{box-sizing:border-box;}
html{overflow-x:hidden;width:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#e9ebe4;color:var(--text);overflow-x:hidden;width:100%;max-width:100vw;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
#app{max-width:1100px;margin:0 auto;}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;}
.btn{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--gold);color:#17331F;}
.btn-secondary{background:#fff;color:var(--ink);border:1px solid #DDD9CC;}
.badge{font-size:11px;font-weight:600;border-radius:999px;padding:3px 10px;white-space:nowrap;display:inline-block;}
input,select{font-family:inherit;font-size:16px;padding:9px 11px;border-radius:8px;border:1px solid #DDD9CC;width:100%;box-sizing:border-box;color:var(--ink);}
label.field-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.field{margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{padding:10px 14px;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;text-align:left;background:#F7F8FA;white-space:nowrap;}
td{padding:10px 14px;color:var(--text);border-top:1px solid #EEECE3;white-space:nowrap;}
.mono{font-family:'IBM Plex Mono',monospace;}

/* App shell */
.app-shell{display:flex;flex-direction:row;min-height:640px;background:var(--bg);border-radius:18px;overflow:hidden;border:1px solid var(--border);}
.sidebar{width:220px;background:var(--dark);padding:22px 14px;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:0 6px;margin-bottom:26px;}
.sidebar-logo-chip{width:42px;height:42px;border-radius:10px;background:var(--chip);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sidebar-logo-chip img{width:32px;height:32px;object-fit:contain;}
.sidebar-brand-name{color:#fff;font-weight:700;font-size:14px;}
.sidebar-brand-sub{color:#9AAAC2;font-weight:500;font-size:10.5px;}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:#9DB6A0;font-size:14px;font-weight:500;text-align:left;margin-bottom:4px;font-family:inherit;}
.nav-item.active{background:var(--mid);color:#F7D9A0;}
.nav-item svg{flex-shrink:0;}
.nav-item .lbl{flex:1;}
.nav-count{font-size:11px;background:#1F4A2C;color:#C9E4C5;border-radius:999px;padding:2px 8px;}
.nav-item.active .nav-count{background:var(--dark2);}
.sidebar-footer{margin-top:auto;}
.sidebar-footer label{font-size:10.5px;color:#9DB6A0;display:block;margin-bottom:4px;}
.sidebar-footer input{background:var(--dark2);border:1px solid var(--mid);color:#E8F0E4;font-size:16px;padding:6px 8px;}
.sidebar-switch-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px solid var(--mid);color:#C9E4C5;border-radius:9px;padding:8px 0;font-size:12.5px;cursor:pointer;margin:10px 0 8px;font-family:inherit;}
.sidebar-note{font-size:11px;color:#5F6E85;padding:0 6px;}
.content{flex:1;padding:24px 28px;overflow-y:auto;overflow-x:hidden;min-width:0;}

/* Bottom nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--dark);border-top:1px solid var(--mid);justify-content:space-around;padding:8px 4px;z-index:20;}
.bottom-nav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;color:#8FA396;font-size:10.5px;font-family:inherit;}
.bottom-nav button.active{color:var(--gold-light);}
.finance-pills{display:none;gap:6px;margin-bottom:14px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:4px;}
.finance-pills button{flex:1;min-width:0;border:none;border-radius:7px;padding:7px 0;font-size:12.5px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;}
.finance-pills button.active{background:var(--dark);color:#fff;}

@media (max-width:700px){
  .app-shell{flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;border-radius:0;border:none;}
  .sidebar{width:100%;padding:14px 16px;}
  .sidebar-nav-desktop, .sidebar-footer-desktop{display:none;}
  .sidebar-brand{margin-bottom:0;}
  .content{padding:14px 14px 84px;}
  .bottom-nav{display:flex;}
  .finance-pills.show-mobile{display:flex;}
  .mobile-gear{display:flex !important;}
}
.mobile-gear{display:none;background:transparent;border:1px solid var(--mid);border-radius:8px;width:34px;height:34px;align-items:center;justify-content:center;cursor:pointer;}

/* Unit / property cards */
.unit-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;width:220px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px;flex:1 1 200px;min-width:180px;}
.stat-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.flex-wrap-gap{display:flex;flex-wrap:wrap;gap:12px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,24,32,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:24px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-close{border:none;background:#F1EFE8;border-radius:8px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Public view */
.public-wrap{min-height:640px;background:var(--bg);border-radius:18px;border:1px solid var(--border);overflow:hidden;position:relative;padding-bottom:64px;}
.public-header{position:relative;background:linear-gradient(120deg,#0F2E1C 0%,#1B4B2C 55%,#173F27 100%);padding:18px 20px 30px;text-align:center;overflow:hidden;}
.public-header .dotpattern{position:absolute;inset:0;background-image:radial-gradient(rgba(205,163,64,.35) 1px,transparent 1.4px);background-size:16px 16px;-webkit-mask-image:radial-gradient(circle at 85% 90%,black 0%,black 35%,transparent 70%);mask-image:radial-gradient(circle at 85% 90%,black 0%,black 35%,transparent 70%);pointer-events:none;}
.public-header .glow{position:absolute;inset:0;background:radial-gradient(circle at 88% 6%,rgba(205,163,64,.25),transparent 50%),radial-gradient(circle at 4% 96%,rgba(255,255,255,.05),transparent 45%);pointer-events:none;}
.public-header-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:12px;max-width:480px;margin:0 auto;}
.public-header-inner img.logo{width:52px;height:52px;object-fit:contain;flex-shrink:0;}
.public-title{color:#FFFDF6;font-size:22px;line-height:1.15;font-weight:800;margin:0;font-family:'Playfair Display',Georgia,serif;letter-spacing:.2px;
  text-shadow:1px 1px 0 #0a2416,2px 2px 0 #0a2416,3px 4px 8px rgba(0,0,0,.4);}
.public-slogan{color:#D9B968;font-size:11.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.public-location{position:relative;z-index:1;color:#C9D9CE;font-size:12px;margin:10px auto 0;max-width:480px;display:flex;align-items:center;justify-content:center;gap:5px;}
.public-header-actions{position:relative;z-index:1;display:flex;gap:8px;justify-content:center;margin-top:12px;}
.public-header-actions a{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;text-decoration:none;border-radius:999px;padding:7px 14px;}
.public-header-actions .btn-wa{background:#EA9010;color:#3A2503;}
.public-header-actions .btn-maps{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.35);}
.public-wave{position:absolute;bottom:-1px;left:0;width:100%;height:26px;display:block;}
.public-body{padding:20px 20px 8px;position:relative;}
.public-watermark{position:absolute;top:4px;right:12px;width:100px;opacity:.05;pointer-events:none;}
.owner-icon-btn{position:absolute;top:12px;right:12px;z-index:2;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:999px;width:32px;height:32px;cursor:pointer;}

/* Facility badges (public) */
.fac-badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:#374151;background:#F1EFE8;border-radius:999px;padding:4px 9px;}
.fac-more{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;color:#8A6A1D;background:#FAEEDA;border-radius:999px;padding:4px 9px;cursor:pointer;border:none;font-family:inherit;}

/* Unit photo placeholder */
.unit-photo{width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,#EDE7D3 0%,#DCCB9E 100%);display:flex;align-items:center;justify-content:center;font-size:30px;}

/* Prominent price */
.price-main{font-size:21px;font-weight:800;color:#173F27;line-height:1.2;}
.price-sub{font-size:11px;color:#9A988F;margin-top:2px;}

/* Sticky contact bar */
.sticky-contact-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;display:flex;gap:8px;padding:10px 16px;background:#fff;border-top:1px solid var(--border);z-index:50;box-shadow:0 -4px 14px rgba(0,0,0,.08);box-sizing:border-box;}
.sticky-contact-bar a{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:700;text-decoration:none;border-radius:9px;padding:10px 0;}
.sticky-contact-bar .btn-wa{background:#173F27;color:#fff;}
.sticky-contact-bar .btn-maps{background:#fff;color:#173F27;border:1px solid #173F27;}

@media (max-width:700px){
  .public-header-inner img.logo{width:46px;height:46px;}
  .public-title{font-size:19px;}
}

.tab-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:10px;}
.tab-header h2{margin:0;font-size:20px;font-weight:700;color:#1B2A41;}
.tab-actions{display:flex;gap:8px;flex-wrap:wrap;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:100%;box-sizing:border-box;}

@media (max-width:700px){
  .tab-header h2{font-size:17px;}
  .btn{padding:8px 12px;font-size:12.5px;white-space:nowrap;}
  .table-scroll table{min-width:620px;}
  .unit-card{width:100%;box-sizing:border-box;}
}
</style>
</head>

// ================= HELPERS =================
function rupiah(n){ return "Rp " + Math.round(n).toLocaleString("id-ID"); }
function formatTanggal(dateStr){
  if(!dateStr) return "-";
  const parts = dateStr.split("-");
  if(parts.length!==3) return dateStr;
  const [y,m,d] = parts;
  return `${d}-${m}-${y}`;
}
function advanceJatuhTempo(dateStr, metodeBayar){
  const d = new Date(dateStr);
  if(metodeBayar==="tahunan") d.setFullYear(d.getFullYear()+1);
  else d.setMonth(d.getMonth()+1);
  return d.toISOString().slice(0,10);
}
function uid(prefix){ return prefix + Date.now() + Math.floor(Math.random()*1000); }
function propertyById(id){ return properties.find(p=>p.id===id); }
function unitById(id){ return units.find(u=>u.id===id); }
function tenantById(id){ return tenants.find(t=>t.id===id); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function hariTelat(jatuhTempo){
  if(!jatuhTempo) return 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(jatuhTempo); target.setHours(0,0,0,0);
  const diff = Math.round((today-target)/86400000);
  return diff>0?diff:0;
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target-today)/86400000);
}
function waLink(kontak,message){
  let phone = (kontak||"").replace(/\D/g,"");
  if(phone.startsWith("0")) phone="62"+phone.slice(1);
  else if(!phone.startsWith("62")) phone="62"+phone;
  return `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
}
function buildTagihanMessage({nama,propNama,unitNomor,tagihan,denda,jatuhTempo}){
  let msg = `Halo ${nama}, ini pengingat pembayaran kost di ${propNama||"-"} kamar ${unitNomor||"-"}.\nJumlah tagihan: ${rupiah(tagihan)}`;
  if(denda>0) msg += ` + denda keterlambatan ${rupiah(denda)} (total ${rupiah(tagihan+denda)})`;
  msg += `\nJatuh tempo: ${formatTanggal(jatuhTempo)}\nMohon segera melakukan pembayaran. Terima kasih.`;
  return msg;
}
function ymKey(dateStr){ const d=new Date(dateStr); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function ymLabel(key){ const [y,m]=key.split("-"); return new Date(Number(y),Number(m)-1,1).toLocaleDateString("id-ID",{month:"long",year:"numeric"}); }
function estimateUnitValue(u){
  if(u.hargaBulanan>0) return u.hargaBulanan;
  const t = tenants.find(t=>t.unitId===u.id && t.rumahShareTotal);
  return t? t.rumahShareTotal/t.rumahJmlOrang : 0;
}
function badge(text,fg,bg){ return `<span class="badge" style="color:${fg};background:${bg}">${text}</span>`; }

const FACILITY_EMOJI = [
  [["kamar mandi"],"🚿"],[["wifi"],"📶"],[["parkir"],"🚗"],[["almari","lemari"],"🗄️"],
  [["mushola"],"🕌"],[["tempat tidur"],"🛏️"],[["meja","kursi"],"🪑"],[["listrik"],"⚡"],
  [["sampah"],"🗑️"],[["keamanan"],"🛡️"],[["jemuran"],"👕"],[["ruang tamu"],"🛋️"],
  [["cantelan"],"🧷"],[["dapur"],"🍳"],[["garasi"],"🚙"],
];
function facilityEmoji(name){
  const n = name.toLowerCase();
  for(const [keys,emoji] of FACILITY_EMOJI){ if(keys.some(k=>n.includes(k))) return emoji; }
  return "✓";
}
function toggleMoreFacilities(unitId){
  const span = document.getElementById("hiddenFac-"+unitId);
  const btn = document.getElementById("facMoreBtn-"+unitId);
  if(!span) return;
  const isHidden = span.style.display === "none";
  span.style.display = isHidden ? "contents" : "none";
  if(btn) btn.style.display = isHidden ? "none" : "inline-flex";
}
function sortFacilitiesByPriority(list){
  return [...list].sort((a,b)=>{
    const ai = FACILITY_PRIORITY.findIndex(k=>a.toLowerCase().includes(k));
    const bi = FACILITY_PRIORITY.findIndex(k=>b.toLowerCase().includes(k));
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });
}

function renderDashboard(){
  const totalIncome = income.reduce((s,i)=>s+i.jumlah,0);
  const totalExpense = expenses.reduce((s,e)=>s+e.jumlah,0);
  const netCashflow = totalIncome - totalExpense;
  const occupiedCount = units.filter(u=>u.status==="terisi").length;
  const occupancyRate = units.length? Math.round(occupiedCount/units.length*100) : 0;
  const telatCount = income.filter(i=>i.status==="telat").length;

  const expenseByCategory = {};
  expenses.forEach(e=>{ expenseByCategory[e.kategori] = (expenseByCategory[e.kategori]||0)+e.jumlah; });
  const maxExpense = Math.max(...Object.values(expenseByCategory), 1);

  const reminders = tenants.map(t=>({t,days:daysUntil(t.jatuhTempo)})).filter(r=>r.days!==null && r.days<=3).sort((a,b)=>a.days-b.days);

  function statCard(label,value,icon,tone,sub){
    const tones = {
      neutral:{bg:"#F1EFE8",fg:"#2C2C2A"}, good:{bg:"#EAF3DE",fg:"#27500A"},
      bad:{bg:"#FCEBEB",fg:"#791F1F"}, accent:{bg:"#FAEEDA",fg:"#633806"},
    };
    const c = tones[tone];
    return `<div class="stat-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div class="stat-icon" style="background:${c.bg};color:${c.fg};">${icon}</div>
        <span style="font-size:13px;color:#6B7280;font-weight:500;">${label}</span>
      </div>
      <div class="mono" style="font-size:22px;font-weight:600;color:#1B2A41;">${value}</div>
      ${sub?`<div style="font-size:12px;color:#9A988F;margin-top:4px;">${sub}</div>`:""}
    </div>`;
  }

  const remindersHtml = reminders.length ? `
    <div class="card" style="padding:16px;margin-bottom:20px;">
      <h4 style="margin:0 0 12px;font-size:14px;font-weight:600;color:#1B2A41;display:flex;align-items:center;gap:6px;">${ICONS.clock} Pengingat jatuh tempo</h4>
      ${reminders.map(({t,days})=>{
        const u = unitById(t.unitId); const prop = u?propertyById(u.propertiId):null;
        const overdue = days<0;
        const label = overdue?`Telat ${Math.abs(days)} hari`:(days===0?"Jatuh tempo hari ini":`${days} hari lagi`);
        const fg = overdue?"#791F1F":"#633806", bg = overdue?"#FCEBEB":"#FAEEDA";
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #EEECE3;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13.5px;font-weight:600;color:#1B2A41;">${esc(t.nama)}</div>
            <div style="font-size:11.5px;color:#9A988F;overflow-wrap:break-word;">${esc(prop?.nama)} · ${esc(u?.nomor)} · jatuh tempo ${formatTanggal(t.jatuhTempo)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            ${badge(label,fg,bg)}
            <button onclick="openAddIncomeForm('${t.id}')" style="border:1px solid #B5D4F4;background:#E6F1FB;color:#0C447C;border-radius:7px;padding:5px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">Catat bayar</button>
          </div>
        </div>`;
      }).join("")}
    </div>` : "";

  const expenseCatHtml = Object.keys(expenseByCategory).length===0 ? `<p style="font-size:13px;color:#9A988F;">Belum ada data.</p>` :
    Object.entries(expenseByCategory).sort((a,b)=>b[1]-a[1]).map(([kat,val])=>{
      const meta = KATEGORI_META[kat]||KATEGORI_META.lain;
      return `<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
          <span style="color:#374151;">${meta.label}</span>
          <span class="mono" style="color:#1B2A41;">${rupiah(val)}</span>
        </div>
        <div style="height:6px;background:#F1EFE8;border-radius:4px;">
          <div style="height:6px;width:${(val/maxExpense)*100}%;background:${meta.color};border-radius:4px;"></div>
        </div>
      </div>`;
    }).join("");

  const occupancyMapHtml = properties.map(p=>{
    const propUnits = units.filter(u=>u.propertiId===p.id);
    const squares = propUnits.map(u=>`<div title="${esc(u.nomor)} — ${u.status}" style="width:22px;height:22px;border-radius:6px;background:${u.status==='terisi'?'#639922':'#D3D1C7'};"></div>`).join("");
    return `<div style="margin-bottom:14px;">
      <div style="font-size:13px;color:#374151;margin-bottom:6px;display:flex;justify-content:space-between;">
        <span>${esc(p.nama)}</span>${badge(TIPE_LABEL[p.tipe],"#633806","#FAEEDA")}
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">${squares || '<span style="font-size:12px;color:#9A988F;">Belum ada unit</span>'}</div>
    </div>`;
  }).join("");

  return `
    <h2 style="margin:0 0 4px;font-size:20px;font-weight:700;color:#1B2A41;">Dashboard</h2>
    <p style="margin:0 0 20px;font-size:13px;color:#6B7280;">Ringkasan keuangan dan okupansi seluruh properti.</p>
    <div class="flex-wrap-gap" style="margin-bottom:14px;">
      ${statCard("Pemasukan",rupiah(totalIncome),ICONS.trend,"good")}
      ${statCard("Pengeluaran",rupiah(totalExpense),ICONS.trenddown,"bad")}
      ${statCard("Arus kas bersih",rupiah(netCashflow),ICONS.wallet,netCashflow>=0?"good":"bad")}
    </div>
    <div class="flex-wrap-gap" style="margin-bottom:20px;">
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Total kamar</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#1B2A41;">${units.length}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Terisi</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#27500A;">${occupiedCount}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Kosong</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#8A6A1D;">${units.length-occupiedCount}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Jumlah penghuni</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#1B2A41;">${tenants.length}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Okupansi</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#1B2A41;">${occupancyRate}%</div>
      </div>
    </div>
    ${telatCount>0?`<div style="display:flex;align-items:center;gap:8px;background:#FCEBEB;color:#791F1F;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;">${ICONS.alert} Ada ${telatCount} pembayaran berstatus telat. Cek tab Pemasukan.</div>`:""}
    ${remindersHtml}
    <div class="flex-wrap-gap" style="gap:20px;">
      <div class="card" style="padding:18px;flex:1 1 320px;">
        <h4 style="margin:0 0 12px;font-size:14px;font-weight:600;color:#1B2A41;">Pengeluaran per kategori</h4>
        ${expenseCatHtml}
      </div>
      <div class="card" style="padding:18px;flex:1 1 320px;">
        <h4 style="margin:0 0 12px;font-size:14px;font-weight:600;color:#1B2A41;">Peta okupansi per properti</h4>
        ${occupancyMapHtml}
      </div>
    </div>
  `;
}

// ================= UNITS TAB =================
function renderUnitsTab(){
  const filterStatus = state.unitFilterStatus || "all";
  const filterProp = state.unitFilterProp || "all";

  const propOptionsHtml = `<option value="all">Semua properti</option>` +
    properties.map(p=>`<option value="${p.id}" ${filterProp===p.id?"selected":""}>${esc(p.nama)}</option>`).join("");

  const visibleProperties = properties.filter(p => filterProp==="all" || p.id===filterProp);

  const statUnits = units.filter(u => visibleProperties.some(p=>p.id===u.propertiId));
  const statTerisi = statUnits.filter(u=>u.status==='terisi').length;
  const statKosong = statUnits.filter(u=>u.status==='kosong').length;
  const statPenghuni = tenants.filter(t => { const u=unitById(t.unitId); return u && visibleProperties.some(p=>p.id===u.propertiId); }).length;
  const statOkupansi = statUnits.length ? Math.round(statTerisi/statUnits.length*100) : 0;

  const statsHtml = `
    <div class="flex-wrap-gap" style="margin-bottom:16px;">
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Total kamar</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#1B2A41;">${statUnits.length}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Terisi</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#27500A;">${statTerisi}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Kosong</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#8A6A1D;">${statKosong}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Jumlah penghuni</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#1B2A41;">${statPenghuni}</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#6B7280;margin-bottom:4px;">Okupansi</div>
        <div class="mono" style="font-size:20px;font-weight:700;color:#1B2A41;">${statOkupansi}%</div>
      </div>
    </div>`;

  const groups = visibleProperties.map(p=>{
    let propUnits = units.filter(u=>u.propertiId===p.id);
    if(filterStatus!=="all") propUnits = propUnits.filter(u=>u.status===filterStatus);
    if(propUnits.length===0 && filterStatus!=="all") return "";
    const cards = propUnits.map(u=>{
      const isOpen = state.openHistoryFor===u.id;
      const hist = riwayat.filter(r=>r.unitId===u.id).sort((a,b)=>new Date(b.tglMasuk)-new Date(a.tglMasuk));
      const histHtml = isOpen ? `
        <div style="margin-top:8px;border-top:1px solid rgba(0,0,0,0.08);padding-top:8px;">
          ${hist.length===0?`<div style="font-size:11.5px;color:#9A988F;">Belum ada riwayat.</div>`:
            hist.map(r=>`<div style="font-size:11.5px;margin-bottom:6px;">
              <div style="font-weight:600;color:#1B2A41;">${esc(r.nama)}</div>
              <div style="color:#9A988F;">${r.tglMasuk} → ${r.tglKeluar||"sekarang"}</div>
            </div>`).join("")}
        </div>` : "";
      const hargaBlock = u.hargaBulanan>0 ? `
        <div style="font-size:12.5px;">
          <div style="display:flex;justify-content:space-between;"><span style="color:#6B7280;">Bulanan</span><span class="mono" style="font-weight:600;">${rupiah(u.hargaBulanan)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:#6B7280;">Tahunan (11 bln)</span><span class="mono" style="font-weight:600;">${rupiah(u.hargaTahunan)}</span></div>
        </div>` : `<div style="font-size:11.5px;color:#9A988F;">Harga diatur di level rumah sewa (patungan)</div>`;
      const isTerisi = u.status==='terisi';
      const cardBg = isTerisi ? "#F3FAF0" : "#FFF9EC";
      const cardBorder = isTerisi ? "#BFE3AE" : "#F0D9A0";
      return `
      <div class="unit-card" style="background:${cardBg};border-color:${cardBorder};border-left:4px solid ${isTerisi?'#5FA83C':'#D9A441'};">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-weight:600;font-size:14px;color:#1B2A41;">${esc(u.nomor)}</span>
          ${badge(u.status,isTerisi?'#27500A':'#8A6A1D',isTerisi?'#DDF0D2':'#FBEBC8')}
        </div>
        <div style="font-size:12px;color:#6B7280;margin-bottom:8px;">${esc(u.tipeKamar)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">${u.fasilitas.map(f=>badge(esc(f),"#5F5E5A","#F1EFE8")).join(" ")}</div>
        ${hargaBlock}
        <div style="display:flex;gap:6px;margin-top:10px;">
          <button onclick="toggleHistory('${u.id}')" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.6);border-radius:8px;padding:6px 0;font-size:11.5px;color:#6B7280;cursor:pointer;font-family:inherit;">${ICONS.history} Riwayat</button>
          ${isTerisi ? `<button onclick="markUnitKosong('${u.id}')" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.6);border-radius:8px;padding:6px 0;font-size:11.5px;color:#6B7280;cursor:pointer;font-family:inherit;">Tandai kosong</button>` : `<button onclick="state.tab='tenants'; render();" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.6);border-radius:8px;padding:6px 0;font-size:11.5px;color:#6B7280;cursor:pointer;font-family:inherit;">${ICONS.plus} Tambah penyewa</button>`}
        </div>
        ${histHtml}
      </div>`;
    }).join("");
    const fasilitasUmumHtml = (p.fasilitasUmum && p.fasilitasUmum.length) ? `
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;">
        <span style="font-size:11.5px;color:#9A988F;margin-right:2px;">Fasilitas gratis:</span>
        ${p.fasilitasUmum.map(f=>badge(esc(f),"#0F6E56","#E1F5EE")).join(" ")}
      </div>` : "";
    return `<div style="margin-bottom:22px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
        <h4 style="margin:0;font-size:15px;font-weight:600;color:#1B2A41;">${esc(p.nama)}</h4>
        ${badge(TIPE_LABEL[p.tipe],"#633806","#FAEEDA")}
        <span style="font-size:12px;color:#9A988F;">${esc(p.alamat)}</span>
      </div>
      ${fasilitasUmumHtml}      <div class="flex-wrap-gap">${cards || `<span style="font-size:13px;color:#9A988F;">Belum ada kamar / unit di properti ini.</span>`}</div>
    </div>`;
  }).join("");

  return `
    <div class="tab-header">
      <h2>Properti & kamar</h2>
      <div class="tab-actions">
        <button class="btn btn-secondary" onclick="openAddPropertyForm()">${ICONS.plus} Properti</button>
        <button class="btn btn-primary" onclick="openAddUnitForm()">${ICONS.plus} Kamar</button>
      </div>
    </div>
    <p style="margin:0 0 14px;font-size:13px;color:#6B7280;">Kelola varian harga dan fasilitas tiap kamar, termasuk kost multi kamar, kost 1 pintu, dan rumah sewa utuh.</p>
    ${statsHtml}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;">
      <select onchange="state.unitFilterStatus=this.value; render();" style="flex:1;min-width:130px;">
        <option value="all" ${filterStatus==="all"?"selected":""}>Semua status</option>
        <option value="terisi" ${filterStatus==="terisi"?"selected":""}>Terisi</option>
        <option value="kosong" ${filterStatus==="kosong"?"selected":""}>Kosong</option>
      </select>
      <select onchange="state.unitFilterProp=this.value; render();" style="flex:1;min-width:130px;">${propOptionsHtml}</select>
    </div>
    ${groups || `<p style="font-size:13px;color:#9A988F;">Tidak ada kamar yang cocok dengan filter ini.</p>`}
  `;
}
function markUnitKosong(unitId){
  const activeTenant = tenants.find(t=>t.unitId===unitId);
  if(activeTenant){
    const ok = confirm(`Kamar ini masih tercatat dihuni oleh ${activeTenant.nama}. Menandai kosong TIDAK menghapus data penyewa tersebut — sebaiknya hapus penyewanya dulu lewat tab Penyewa. Lanjutkan menandai kosong saja?`);
    if(!ok) return;
  }
  units = units.map(u => u.id===unitId ? {...u, status:'kosong'} : u);
  render();
}
function toggleHistory(unitId){
  state.openHistoryFor = state.openHistoryFor===unitId ? null : unitId;
  render();
}

function openAddPropertyForm(){
  const options = `<option value="kost_multi">Kost multi kamar</option><option value="kost_1_pintu">Kost 1 pintu</option><option value="rumah_sewa">Rumah sewa (3-4 orang)</option>`;
  showModal("Tambah properti", `
    <div class="field"><label class="field-label">Nama properti</label><input id="fNamaProp" placeholder="Kost Melati"></div>
    <div class="field"><label class="field-label">Tipe properti</label><select id="fTipeProp">${options}</select></div>
    <div class="field"><label class="field-label">Alamat</label><input id="fAlamatProp" placeholder="Jl. Contoh No. 1"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;">
      <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="submitAddProperty()">Simpan</button>
    </div>
  `);
}
function submitAddProperty(){
  const nama = document.getElementById("fNamaProp").value;
  if(!nama) return;
  properties.push({ id:uid("p"), nama, tipe:document.getElementById("fTipeProp").value, alamat:document.getElementById("fAlamatProp").value });
  closeModal(); render();
}

function openAddUnitForm(){
  const propOptions = properties.map(p=>`<option value="${p.id}">${esc(p.nama)}</option>`).join("");
  showModal("Tambah kamar / unit", `
    <div class="field"><label class="field-label">Properti</label><select id="fPropUnit">${propOptions}</select></div>
    <div class="field"><label class="field-label">Nomor / nama kamar</label><input id="fNomorUnit" placeholder="101"></div>
    <div class="field"><label class="field-label">Tipe kamar</label><input id="fTipeKamarUnit" placeholder="Standar / Deluxe"></div>
    <div class="field"><label class="field-label">Fasilitas (pisahkan koma)</label><input id="fFasilitasUnit" value="WiFi, Kamar mandi dalam"></div>
    <div style="display:flex;gap:10px;">
      <div class="field" style="flex:1"><label class="field-label">Harga bulanan (Rp)</label><input type="number" id="fHargaBulananUnit"></div>
      <div class="field" style="flex:1"><label class="field-label">Harga tahunan (Rp)</label><input type="number" id="fHargaTahunanUnit"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="submitAddUnit()">Simpan</button>
    </div>
  `);
}
function submitAddUnit(){
  const propertiId = document.getElementById("fPropUnit").value;
  const nomor = document.getElementById("fNomorUnit").value;
  if(!propertiId || !nomor) return;
  const fasilitas = document.getElementById("fFasilitasUnit").value.split(",").map(f=>f.trim()).filter(Boolean);
  units.push({
    id:uid("u"), propertiId, nomor, tipeKamar:document.getElementById("fTipeKamarUnit").value || "Standar",
    fasilitas, hargaBulanan:Number(document.getElementById("fHargaBulananUnit").value)||0,
    hargaTahunan:Number(document.getElementById("fHargaTahunanUnit").value)||0, status:"kosong",
  });
  closeModal(); render();
}

// ================= TENANTS TAB =================
function renderTenantsTab(){
  const rows = tenants.map(t=>{
    const u = unitById(t.unitId); const prop = u?propertyById(u.propertiId):null;
    const share = t.rumahShareTotal ? t.rumahShareTotal/t.rumahJmlOrang : (u?u.hargaBulanan:0);
    const telatHari = hariTelat(t.jatuhTempo);
    const denda = telatHari * state.dendaPerHari;
    const msg = buildTagihanMessage({nama:t.nama,propNama:prop?.nama,unitNomor:u?.nomor,tagihan:share,denda,jatuhTempo:t.jatuhTempo});
    const dendaBadge = telatHari>0 ? `<div style="margin-top:2px;">${badge(`+${rupiah(denda)} denda (${telatHari}h)`,"#791F1F","#FCEBEB")}</div>` : "";
    return `<tr>
      <td><div style="font-weight:600;color:#1B2A41;">${esc(t.nama)}</div><div style="font-size:11.5px;color:#9A988F;">${esc(t.kontak)}</div></td>
      <td>${u?`${esc(prop?.nama)} · ${esc(u.nomor)}`:"-"}</td>
      <td>${badge(t.metodeBayar, t.metodeBayar==='tahunan'?'#8A6A1D':'#0F6E56', t.metodeBayar==='tahunan'?'#FAEEDA':'#E1F5EE')}</td>
      <td>${formatTanggal(t.jatuhTempo)}</td>
      <td class="mono">${rupiah(share)}${dendaBadge}</td>
      <td>
        <div style="display:flex;gap:4px;">
          <button onclick="openDocModal('${t.id}')" title="Dokumen" style="border:none;background:transparent;cursor:pointer;padding:4px;color:#534AB7;">${ICONS.doc}</button>
          <a href="${waLink(t.kontak,msg)}" target="_blank" rel="noopener noreferrer" title="WA" style="padding:4px;display:flex;color:#0F6E56;">${ICONS.wa}</a>
          <button onclick="removeTenant('${t.id}')" title="Hapus" style="border:none;background:transparent;cursor:pointer;padding:4px;color:#A32D2D;">${ICONS.trash}</button>
        </div>
      </td>
    </tr>`;
  }).join("");

  return `
    <div class="tab-header">
      <h2>Penyewa</h2>
      <button class="btn btn-primary" onclick="openAddTenantForm()">${ICONS.plus} Penyewa</button>
    </div>
    <p style="margin:0 0 12px;font-size:13px;color:#6B7280;">Untuk rumah sewa yang dihuni 3-4 orang, biaya bisa dibagi rata otomatis. Denda telat dihitung otomatis dari jatuh tempo.</p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;color:#374151;">
      <span>Denda keterlambatan:</span><span style="color:#6B7280;">Rp</span>
      <input type="number" value="${state.dendaPerHari}" oninput="state.dendaPerHari=Number(this.value)||0" style="width:90px;padding:5px 8px;">
      <span style="color:#6B7280;">/ hari telat</span>
    </div>
    <div class="card" style="overflow:hidden;">
      <div class="table-scroll"><table>
        <thead><tr><th>Nama</th><th>Unit</th><th>Metode</th><th>Jatuh tempo</th><th>Tagihan</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `;
}

function removeTenant(id){
  const t = tenantById(id);
  tenants = tenants.filter(x=>x.id!==id);
  if(t){
    units = units.map(u=>u.id===t.unitId?{...u,status:"kosong"}:u);
    riwayat = riwayat.map(r=> (r.unitId===t.unitId && r.nama===t.nama && !r.tglKeluar) ? {...r, tglKeluar:new Date().toISOString().slice(0,10)} : r);
  }
  render();
}

let tempTenantFiles = {ktp:null, foto:null};
function handleTenantFile(evt, kind){
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    tempTenantFiles[kind] = reader.result;
    const wrap = document.getElementById(kind==='ktp'?'ktpPreviewWrap':'fotoPreviewWrap');
    wrap.innerHTML = `<img src="${reader.result}" style="width:100%;max-height:70px;object-fit:cover;border-radius:6px;">`;
  };
  reader.readAsDataURL(file);
}
function submitAddTenant(){
  const nama = document.getElementById("fNamaTenant").value;
  const unitId = document.getElementById("fUnitTenant").value;
  if(!nama || !unitId) return;
  const isShared = document.getElementById("fSharedTenant").checked;
  const tglMasuk = document.getElementById("fMasukTenant").value || new Date().toISOString().slice(0,10);
  const newTenant = {
    id:uid("t"), nama, kontak:document.getElementById("fKontakTenant").value,
    unitId, metodeBayar:document.getElementById("fMetodeTenant").value,
    tglMasuk, jatuhTempo:document.getElementById("fJatuhTempoTenant").value,
    ktpDataUrl:tempTenantFiles.ktp, fotoDataUrl:tempTenantFiles.foto,
  };
  if(isShared){
    newTenant.rumahShareTotal = Number(document.getElementById("fShareTotalTenant").value)||0;
    newTenant.rumahJmlOrang = Number(document.getElementById("fShareJmlTenant").value)||1;
  }
  tenants.push(newTenant);
  units = units.map(u=>u.id===unitId?{...u,status:"terisi"}:u);
  riwayat.push({ id:uid("r"), unitId, nama, tglMasuk, tglKeluar:null });
  tempTenantFiles = {ktp:null, foto:null};
  closeModal(); render();
}

function statusBadgeDot(status){
  if(status==="lunas") return `<span class="fac-badge" style="background:#EAF3DE;color:#27500A;">🟢 Lunas</span>`;
  if(status==="menunggu") return `<span class="fac-badge" style="background:#FFF6DC;color:#8A6A1D;">🟡 Menunggu</span>`;
  return `<span class="fac-badge" style="background:#FCEBEB;color:#791F1F;">🔴 Telat</span>`;
}

function buildIncomeListHtml(){
  const search = (state.incomeSearch||"").toLowerCase();
  const filterStatus = state.incomeFilterStatus||"all";
  const filterBulan = state.incomeFilterBulan||"all";

  let filtered = income.slice();
  if(search) filtered = filtered.filter(i=>{ const t=tenantById(i.tenantId); return t && t.nama.toLowerCase().includes(search); });
  if(filterStatus!=="all") filtered = filtered.filter(i=>(i.status||"lunas")===filterStatus);
  if(filterBulan!=="all") filtered = filtered.filter(i=>ymKey(i.tanggal)===filterBulan);
  filtered.sort((a,b)=>new Date(b.tanggal)-new Date(a.tanggal));

  const rowsHtml = filtered.map((i,idx)=>{
    const t = tenantById(i.tenantId);
    return `<tr style="background:${idx%2===1?'#F7F8F5':'#fff'};">
      <td>${esc(t?t.nama:"-")}</td><td>${esc(i.periode)}</td><td>${formatTanggal(i.tanggal)}</td>
      <td class="mono">${rupiah(i.jumlah)}</td><td>${statusBadgeDot(i.status)}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button onclick="openReceipt('${i.id}')" style="display:flex;align-items:center;gap:5px;border:1px solid #B5D4F4;background:#E6F1FB;color:#0C447C;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">${ICONS.printer} Kwitansi</button>
          <button onclick="removeIncome('${i.id}')" title="Hapus" style="border:none;background:transparent;cursor:pointer;padding:4px;color:#A32D2D;">${ICONS.trash}</button>
        </div>
      </td>
    </tr>`;
  }).join("");

  const desktopTable = `
    <div class="card" style="overflow:hidden;" id="incomeTableWrap">
      <div class="table-scroll" style="max-height:520px;overflow-y:auto;">
        <table>
          <thead style="position:sticky;top:0;z-index:2;"><tr><th>Penyewa</th><th>Periode</th><th>Tanggal</th><th>Jumlah</th><th>Status</th><th></th></tr></thead>
          <tbody>${rowsHtml || `<tr><td colspan="6" style="text-align:center;color:#9A988F;padding:20px;">Tidak ada data yang cocok.</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;

  const mobileCards = filtered.length===0 ? `<p style="font-size:13px;color:#9A988F;text-align:center;padding:20px 0;">Tidak ada data yang cocok.</p>` :
    filtered.map(i=>{
      const t = tenantById(i.tenantId);
      return `<div class="card" style="padding:14px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:700;color:#1B2A41;font-size:14.5px;">${esc(t?t.nama:"-")}</span>
          ${statusBadgeDot(i.status)}
        </div>
        <div class="mono" style="font-size:17px;font-weight:700;color:#173F27;margin-bottom:2px;">${rupiah(i.jumlah)}</div>
        <div style="font-size:12px;color:#9A988F;margin-bottom:10px;">${esc(i.periode)} · ${formatTanggal(i.tanggal)}</div>
        <div style="display:flex;gap:6px;">
          <button onclick="openReceipt('${i.id}')" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid #B5D4F4;background:#E6F1FB;color:#0C447C;border-radius:7px;padding:8px 0;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;">${ICONS.printer} Kwitansi</button>
          <button onclick="removeIncome('${i.id}')" style="border:1px solid #F0C9C9;background:#FCEBEB;color:#A32D2D;border-radius:7px;padding:8px 12px;cursor:pointer;">${ICONS.trash}</button>
        </div>

    }).join("");

  return state.isMobile ? mobileCards : desktopTable;

function openAddIncomeForm(prefillTenantId){
  const opts = tenants.map(t=>`<option value="${t.id}" ${prefillTenantId===t.id?"selected":""}>${esc(t.nama)}</option>`).join("");
  const preTenant = prefillTenantId ? tenantById(prefillTenantId) : null;
  const preShare = preTenant ? (preTenant.rumahShareTotal ? preTenant.rumahShareTotal/preTenant.rumahJmlOrang : (unitById(preTenant.unitId)?.hargaBulanan||0)) : "";
  const today = new Date().toISOString().slice(0,10);
  showModal("Catat pemasukan", `
    <div class="field"><label class="field-label">Penyewa</label><select id="fTenantIncome">${opts}</select></div>
    <div class="field"><label class="field-label">Periode</label><input id="fPeriodeIncome" placeholder="Agu 2026" value="${preTenant?ymLabel(today.slice(0,7)):""}"></div>
    <div class="field"><label class="field-label">Tanggal bayar</label><input type="date" id="fTglIncome" value="${today}"></div>
    <div class="field"><label class="field-label">Jumlah (Rp)</label><input type="number" id="fJumlahIncome" value="${preShare||""}"></div>
    <div class="field"><label class="field-label">Status</label><select id="fStatusIncome"><option value="lunas">🟢 Lunas</option><option value="menunggu">🟡 Menunggu</option><option value="telat">🔴 Telat</option></select></div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#374151;margin-bottom:14px;">
      <input type="checkbox" id="fAutoAdvance" checked style="width:auto;">
      Kalau lunas, otomatis majukan jatuh tempo penyewa ke periode berikutnya
    </label>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="submitAddIncome()">Simpan</button>
    </div>
  `);
}
function submitAddIncome(){
  const tenantId = document.getElementById("fTenantIncome").value;
  const jumlah = Number(document.getElementById("fJumlahIncome").value);
  if(!tenantId || !jumlah) return;
  const status = document.getElementById("fStatusIncome").value;
  const autoAdvance = document.getElementById("fAutoAdvance").checked;
  income.push({ id:uid("i"), tenantId, tanggal:document.getElementById("fTglIncome").value, periode:document.getElementById("fPeriodeIncome").value, jumlah, status });
  if(status==="lunas" && autoAdvance){
    const t = tenantById(tenantId);
    if(t) tenants = tenants.map(x => x.id===tenantId ? {...x, jatuhTempo: advanceJatuhTempo(t.jatuhTempo, t.metodeBayar)} : x);
  }
  closeModal(); render();
}

        <button class="btn btn-primary" onclick="shareReceipt('${nomorKwitansi}')">${ICONS.wa} Bagikan</button>
      </div>
    </div>`;

async function renderReceiptCanvas(){
  const node = document.getElementById("receiptContent");
  return await html2canvas(node, { backgroundColor: "#ffffff", scale: 2 });
}
function showReceiptError(msg){
  const el = document.getElementById("receiptActionsError");
  if(el){ el.textContent = msg; el.style.display = "block"; }
}
async function downloadReceipt(nomorKwitansi){
  try{
    const canvas = await renderReceiptCanvas();
    const link = document.createElement("a");
    link.download = `${nomorKwitansi}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  }catch(e){
    showReceiptError("Gagal membuat gambar kwitansi. Coba lagi atau screenshot manual.");
  }
}
async function shareReceipt(nomorKwitansi){
  try{
    const canvas = await renderReceiptCanvas();
    canvas.toBlob(async (blob) => {
      const file = new File([blob], `${nomorKwitansi}.png`, { type: "image/png" });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        try{
          await navigator.share({ files: [file], title: "Kwitansi pembayaran", text: nomorKwitansi });
        }catch(e){ /* user membatalkan share, abaikan */ }
      } else if(navigator.share){
        await navigator.share({ title: "Kwitansi pembayaran", text: nomorKwitansi });
        showReceiptError("Perangkat ini tidak mendukung bagikan gambar, cuma teks. Pakai tombol Download untuk gambarnya.");
      } else {
        showReceiptError("Bagikan tidak didukung di browser ini. Pakai tombol Download saja.");
      }
    }, "image/png");
  }catch(e){
    showReceiptError("Gagal menyiapkan kwitansi untuk dibagikan.");
  }
}

    const p = propertyById(e.propertiId);
    return `<tr>
      <td>${esc(p?p.nama:"-")}</td><td>${meta.label}</td><td>${e.tanggal}</td>
      <td class="mono">${rupiah(e.jumlah)}</td><td style="color:#9A988F;">${esc(e.catatan)||"-"}</td>
      <td><button onclick="removeExpense('${e.id}')" title="Hapus" style="border:none;background:transparent;cursor:pointer;padding:4px;color:#A32D2D;">${ICONS.trash}</button></td>
    </tr>`;
  }).join("");
  return `
    <div class="tab-header">
      <h2>Pengeluaran operasional</h2>
      <button class="btn btn-primary" onclick="openAddExpenseForm()">${ICONS.plus} Catat pengeluaran</button>
    </div>
    <p style="margin:0 0 16px;font-size:13px;color:#6B7280;">Listrik, air, internet, dan biaya operasional lain per properti.</p>
    <div class="card" style="overflow:hidden;">
      <div class="table-scroll"><table><thead><tr><th>Properti</th><th>Kategori</th><th>Tanggal</th><th>Jumlah</th><th>Catatan</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>
  `;
}
function removeExpense(id){ expenses = expenses.filter(x=>x.id!==id); render(); }
function openAddExpenseForm(){
  const propOpts = properties.map(p=>`<option value="${p.id}">${esc(p.nama)}</option>`).join("");
  const katOpts = Object.entries(KATEGORI_META).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("");
  showModal("Catat pengeluaran", `
    <div class="field"><label class="field-label">Properti</label><select id="fPropExp">${propOpts}</select></div>
    <div class="field"><label class="field-label">Kategori</label><select id="fKatExp">${katOpts}</select></div>
    <div class="field"><label class="field-label">Tanggal</label><input type="date" id="fTglExp"></div>
    <div class="field"><label class="field-label">Jumlah (Rp)</label><input type="number" id="fJumlahExp"></div>
    <div class="field"><label class="field-label">Catatan</label><input id="fCatatanExp"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="submitAddExpense()">Simpan</button>
    </div>
  `);
}
function submitAddExpense(){
  const propertiId = document.getElementById("fPropExp").value;
  const jumlah = Number(document.getElementById("fJumlahExp").value);
  if(!propertiId || !jumlah) return;
  expenses.push({ id:uid("e"), propertiId, kategori:document.getElementById("fKatExp").value, tanggal:document.getElementById("fTglExp").value, jumlah, catatan:document.getElementById("fCatatanExp").value });
  closeModal(); render();
}

// ================= REPORTS TAB =================
function renderReportsTab(){
  const monthlyMap = {};
  income.forEach(i=>{
    const t = tenantById(i.tenantId); const u = t?unitById(t.unitId):null; if(!u) return;
    const key = u.propertiId+"|"+ymKey(i.tanggal);
    if(!monthlyMap[key]) monthlyMap[key] = {propertiId:u.propertiId, ym:ymKey(i.tanggal), income:0, expense:0};
    monthlyMap[key].income += i.jumlah;
  });
  expenses.forEach(e=>{
    const key = e.propertiId+"|"+ymKey(e.tanggal);
    if(!monthlyMap[key]) monthlyMap[key] = {propertiId:e.propertiId, ym:ymKey(e.tanggal), income:0, expense:0};
    monthlyMap[key].expense += e.jumlah;
  });
  const monthlyByProperty = Object.values(monthlyMap).sort((a,b)=> a.ym<b.ym?1:-1);

  const dates = income.map(i=>i.tanggal).concat(expenses.map(e=>e.tanggal));
  const currentYm = dates.length ? dates.slice().sort().reverse()[0].slice(0,7) : ymKey(new Date().toISOString());

  const potensiPenuh = units.reduce((s,u)=>s+estimateUnitValue(u),0);
  const realisasiBulanIni = income.filter(i=>ymKey(i.tanggal)===currentYm).reduce((s,i)=>s+i.jumlah,0);
  const captureRate = potensiPenuh>0 ? Math.round(realisasiBulanIni/potensiPenuh*100) : 0;
  const expenseBulanIni = expenses.filter(e=>ymKey(e.tanggal)===currentYm).reduce((s,e)=>s+e.jumlah,0);
  const avgRevenuePerUnit = units.length ? potensiPenuh/units.length : 0;
  const breakEvenUnits = avgRevenuePerUnit>0 ? Math.ceil(expenseBulanIni/avgRevenuePerUnit) : 0;
  const breakEvenPct = units.length ? Math.round(breakEvenUnits/units.length*100) : 0;
  const occupiedNow = units.filter(u=>u.status==="terisi").length;
  const isSafe = occupiedNow >= breakEvenUnits;

  const tableRows = monthlyByProperty.length===0
    ? `<tr><td colspan="5" style="text-align:center;color:#9A988F;">Belum ada data.</td></tr>`
    : monthlyByProperty.map(r=>{
        const net = r.income - r.expense;
        return `<tr>
          <td>${esc(propertyById(r.propertiId)?.nama)||"-"}</td><td>${ymLabel(r.ym)}</td>
          <td class="mono" style="color:#27500A;">${rupiah(r.income)}</td>
          <td class="mono" style="color:#791F1F;">${rupiah(r.expense)}</td>
          <td class="mono" style="font-weight:700;color:${net>=0?'#27500A':'#791F1F'};">${rupiah(net)}</td>
        </tr>`;
      }).join("");

  return `
    <div class="tab-header">
      <h2>Laporan keuangan</h2>
      <button class="btn btn-primary" onclick="exportExcel()">${ICONS.download} Export ke Excel</button>
    </div>
    <p style="margin:0 0 20px;font-size:13px;color:#6B7280;">Rekap bulanan siap diberikan ke pemilik atau untuk lapor pajak kos, plus proyeksi dan kalkulator break-even.</p>
    <div class="flex-wrap-gap" style="margin-bottom:20px;">
      <div class="card" style="padding:18px;flex:1 1 320px;">
        <h4 style="margin:0 0 4px;font-size:14px;font-weight:600;color:#1B2A41;display:flex;align-items:center;gap:6px;">${ICONS.trend} Proyeksi cashflow — ${ymLabel(currentYm)}</h4>
        <p style="margin:0 0 14px;font-size:12px;color:#9A988F;">Potensi jika semua kamar/unit terisi penuh, dibanding realisasi bulan ini.</p>
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span style="color:#6B7280;">Potensi penuh</span><span class="mono" style="color:#1B2A41;">${rupiah(potensiPenuh)}</span></div>
          <div style="height:8px;background:#F1EFE8;border-radius:4px;"><div style="height:8px;width:100%;background:#D3D1C7;border-radius:4px;"></div></div>
        </div>
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span style="color:#6B7280;">Realisasi bulan ini</span><span class="mono" style="color:#1B2A41;">${rupiah(realisasiBulanIni)}</span></div>
          <div style="height:8px;background:#F1EFE8;border-radius:4px;"><div style="height:8px;width:${Math.min(captureRate,100)}%;background:#639922;border-radius:4px;"></div></div>
        </div>
        ${badge(`Tercapai ${captureRate}% dari potensi maksimal`, captureRate>=80?'#27500A':'#633806', captureRate>=80?'#EAF3DE':'#FAEEDA')}
      </div>
      <div class="card" style="padding:18px;flex:1 1 320px;">
        <h4 style="margin:0 0 4px;font-size:14px;font-weight:600;color:#1B2A41;display:flex;align-items:center;gap:6px;">${ICONS.target} Kalkulator break-even</h4>
        <p style="margin:0 0 14px;font-size:12px;color:#9A988F;">Minimal kamar/unit terisi supaya biaya operasional bulan ini tertutup.</p>
        <table style="width:100%;font-size:13px;">
          <tr><td style="color:#6B7280;padding:4px 0;">Biaya operasional bulan ini</td><td style="text-align:right;" class="mono">${rupiah(expenseBulanIni)}</td></tr>
          <tr><td style="color:#6B7280;padding:4px 0;">Rata-rata pendapatan/unit</td><td style="text-align:right;" class="mono">${rupiah(avgRevenuePerUnit)}</td></tr>
          <tr><td style="color:#6B7280;padding:4px 0;">Unit minimal terisi</td><td style="text-align:right;font-weight:700;color:#1B2A41;">${breakEvenUnits} dari ${units.length} (${breakEvenPct}%)</td></tr>
          <tr><td style="color:#6B7280;padding:4px 0;">Unit terisi sekarang</td><td style="text-align:right;font-weight:700;color:#1B2A41;">${occupiedNow}</td></tr>
        </table>
        <div style="margin-top:10px;">${isSafe? badge("Aman, sudah di atas titik impas","#27500A","#EAF3DE") : badge(`Butuh ${breakEvenUnits-occupiedNow} unit lagi supaya impas`,"#791F1F","#FCEBEB")}</div>
      </div>
    </div>
    <div class="card" style="overflow:hidden;">
      <div class="table-scroll"><table><thead><tr><th>Properti</th><th>Bulan</th><th>Pemasukan</th><th>Pengeluaran</th><th>Selisih</th></tr></thead><tbody>${tableRows}</tbody></table></div>
    </div>
  `;
}

function exportExcel(){
  const wb = XLSX.utils.book_new();
  const monthlyMap = {};
  income.forEach(i=>{
    const t = tenantById(i.tenantId); const u = t?unitById(t.unitId):null; if(!u) return;
    const key = u.propertiId+"|"+ymKey(i.tanggal);
    if(!monthlyMap[key]) monthlyMap[key] = {propertiId:u.propertiId, ym:ymKey(i.tanggal), income:0, expense:0};
    monthlyMap[key].income += i.jumlah;
  });
  expenses.forEach(e=>{
    const key = e.propertiId+"|"+ymKey(e.tanggal);
    if(!monthlyMap[key]) monthlyMap[key] = {propertiId:e.propertiId, ym:ymKey(e.tanggal), income:0, expense:0};
    monthlyMap[key].expense += e.jumlah;
  });
  const ringkasan = Object.values(monthlyMap).map(r=>({
    Properti: propertyById(r.propertiId)?.nama||"-", Bulan: ymLabel(r.ym),
    Pemasukan: r.income, Pengeluaran: r.expense, "Arus kas bersih": r.income-r.expense,
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ringkasan), "Ringkasan bulanan");

  const detailIncome = income.map(i=>{
    const t = tenantById(i.tenantId); const u = t?unitById(t.unitId):null; const p = u?propertyById(u.propertiId):null;
    return { Properti:p?.nama||"-", Penyewa:t?.nama||"-", Unit:u?.nomor||"-", Periode:i.periode, Tanggal:i.tanggal, Jumlah:i.jumlah, Status:i.status };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailIncome), "Detail pemasukan");

  const detailExpense = expenses.map(e=>({
    Properti: propertyById(e.propertiId)?.nama||"-", Kategori: (KATEGORI_META[e.kategori]||{}).label||e.kategori,
    Tanggal:e.tanggal, Jumlah:e.jumlah, Catatan:e.catatan||"",
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailExpense), "Detail pengeluaran");

  XLSX.writeFile(wb, "laporan-kost.xlsx");
}

// ================= MAIN RENDER + INIT =================
function render(){
  const app = document.getElementById("app");
  app.innerHTML = state.role==="public" ? renderPublicView() : renderOwnerShell();
}
render();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
